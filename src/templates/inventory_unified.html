<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超商庫存管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inventory.css', v=cache_buster) }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- 導航欄 -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 rounded">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="/">🏪 超商庫存管理系統</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="切換導航選單" aria-expanded="false">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/"><i class="bi bi-house"></i> 食品辨識</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/inventory"><i class="bi bi-box-seam"></i> 庫存管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/expiry-management"><i class="bi bi-calendar-x"></i> 即期品管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/reports"><i class="bi bi-graph-up"></i> 盤點報表</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="advancedMenu" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-star"></i> 高級功能
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="advancedMenu">
                                <li><a class="dropdown-item" href="/barcode-database"><i class="bi bi-qr-code"></i> 條碼資料庫</a></li>
                                <li><a class="dropdown-item" href="/inventory-records"><i class="bi bi-list-check"></i> 進出記錄</a></li>
                                <li><a class="dropdown-item" href="/inventory-alerts"><i class="bi bi-exclamation-triangle"></i> 庫存預警</a></li>
                                <li><a class="dropdown-item" href="/operation-logs"><i class="bi bi-clock-history"></i> 操作日誌</a></li>
                                <li><a class="dropdown-item" href="/report-export"><i class="bi bi-file-earmark-pdf"></i> 報表導出</a></li>
                                <li><a class="dropdown-item" href="/sales-trend"><i class="bi bi-graph-up-arrow"></i> 銷售趨勢</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <header class="mb-4">
            <h1 class="display-6 fw-bold text-primary"><i class="bi bi-box-seam"></i> 庫存管理</h1>
            <p class="lead">統一的商品庫存管理系統</p>
        </header>

        <!-- 統計儀表板 -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white h-100">
                    <div class="card-body text-center">
                        <h1 class="display-5" id="totalItems">0</h1>
                        <p class="card-text">總商品數</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white h-100">
                    <div class="card-body text-center">
                        <h1 class="display-5" id="inStockItems">0</h1>
                        <p class="card-text">在庫商品</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white h-100">
                    <div class="card-body text-center">
                        <h1 class="display-5" id="expiringItems">0</h1>
                        <p class="card-text">即期商品</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white h-100">
                    <div class="card-body text-center">
                        <h1 class="display-5" id="expiredItems">0</h1>
                        <p class="card-text">過期商品</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 銷售結帳 -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">
                <h2 class="h5 mb-0"><i class="bi bi-cart-check"></i> 銷售結帳</h2>
            </div>
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="checkout-product-id" class="form-label">商品 ID</label>
                        <input type="number" class="form-control" id="checkout-product-id" placeholder="請輸入商品 ID">
                    </div>
                    <div class="col-md-4">
                        <label for="checkout-quantity" class="form-label">數量</label>
                        <input type="number" class="form-control" id="checkout-quantity" value="1" min="1">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-success w-100" onclick="checkout()">
                            <i class="bi bi-cart-check-fill"></i> 結帳
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 庫存清單 -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h2 class="h5 mb-0"><i class="bi bi-list"></i> 庫存清單</h2>
            </div>
            <div class="card-body">
                <!-- 篩選條件 -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label" for="statusFilter">狀態篩選</label>
                        <select class="form-select" id="statusFilter" aria-label="狀態篩選">
                            <option value="all">全部</option>
                            <option value="在庫">在庫</option>
                            <option value="已售">已售</option>
                            <option value="下架">下架</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="categoryFilter">分類篩選</label>
                        <select class="form-select" id="categoryFilter" aria-label="分類篩選">
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="locationFilter">架位篩選</label>
                        <select class="form-select" id="locationFilter" aria-label="架位篩選">
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadInventory()">
                            <i class="bi bi-search"></i> 搜尋
                        </button>
                    </div>
                </div>

                <!-- 商品表格 -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>商品名稱</th>
                                <th>分類</th>
                                <th>架位</th>
                                <th>儲存條件</th>
                                <th>庫存量</th>
                                <th>效期</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable">
                            <tr>
                                <td colspan="9" class="text-center text-muted">載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯模態框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">編輯商品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editItemId">
                        
                        <div class="mb-3">
                            <label class="form-label" for="editName">商品名稱</label>
                            <input type="text" class="form-control" id="editName" aria-label="商品名稱" placeholder="請輸入商品名稱">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editBarcode">條碼</label>
                            <input type="text" class="form-control" id="editBarcode" aria-label="條碼" placeholder="請輸入條碼" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editLocation">架位編號</label>
                            <input type="text" class="form-control" id="editLocation" placeholder="如：A1" aria-label="架位編號">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editCondition">儲存條件</label>
                            <select class="form-select" id="editCondition" aria-label="儲存條件">
                                <option value="冷藏">冷藏</option>
                                <option value="常溫">常溫</option>
                                <option value="冷凍">冷凍</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editQuantity">庫存量</label>
                            <input type="number" class="form-control" id="editQuantity" step="0.1" min="0" aria-label="庫存量" placeholder="請輸入庫存量">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editPrice">單位價格</label>
                            <input type="number" class="form-control" id="editPrice" step="0.01" min="0" aria-label="單位價格" placeholder="請輸入單位價格">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editStatus">商品狀態</label>
                            <select class="form-select" id="editStatus" aria-label="商品狀態">
                                <option value="在庫">在庫</option>
                                <option value="已售">已售</option>
                                <option value="下架">下架</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="editAIStatus">AI辨識狀態</label>
                            <select class="form-select" id="editAIStatus" aria-label="AI辨識狀態">
                                <option value="Pass">Pass</option>
                                <option value="Fail">Fail</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        let editModal;

        document.addEventListener('DOMContentLoaded', function() {
            editModal = new bootstrap.Modal(document.getElementById('editModal'));
            loadStats();
            loadInventory();
            loadFilters();
        });

        function loadStats() {
            fetch('/api/inventory/stats')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('totalItems').textContent = data.summary.total_items;
                        document.getElementById('inStockItems').textContent = data.summary.in_stock;
                        document.getElementById('expiringItems').textContent = data.summary.expiring_soon;
                        document.getElementById('expiredItems').textContent = data.summary.expired;
                    }
                });
        }

        function loadInventory() {
            const status = document.getElementById('statusFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const location = document.getElementById('locationFilter').value;

            let url = `/api/inventory/items?page=${currentPage}`;
            if (status !== 'all') url += `&status=${status}`;
            if (category !== 'all') url += `&category=${category}`;
            if (location !== 'all') url += `&storage_location=${location}`;

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        renderTable(data.items);
                    }
                });
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventoryTable');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">沒有符合條件的商品</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td><span class="badge bg-info">${item.storage_location}</span></td>
                    <td>${item.storage_condition}</td>
                    <td>${item.quantity} ${item.unit}</td>
                    <td>${item.expiry_date}</td>
                    <td>
                        <span class="badge ${getStatusBadge(item.item_status)}">
                            ${item.item_status}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editItem(${item.id})">
                            <i class="bi bi-pencil"></i> 編輯
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusBadge(status) {
            const badges = {
                '在庫': 'bg-success',
                '已售': 'bg-secondary',
                '下架': 'bg-danger'
            };
            return badges[status] || 'bg-secondary';
        }

        function loadFilters() {
            fetch('/api/inventory/stats')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        // 填充分類下拉選單
                        const categorySelect = document.getElementById('categoryFilter');
                        data.by_category.forEach(cat => {
                            const option = document.createElement('option');
                            option.value = cat.category;
                            option.textContent = `${cat.category} (${cat.count})`;
                            categorySelect.appendChild(option);
                        });

                        // 填充架位下拉選單
                        const locationSelect = document.getElementById('locationFilter');
                        data.by_location.forEach(loc => {
                            const option = document.createElement('option');
                            option.value = loc.location;
                            option.textContent = `${loc.location} (${loc.count})`;
                            locationSelect.appendChild(option);
                        });
                    }
                });
        }

        function editItem(itemId) {
            fetch(`/api/inventory/items/${itemId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const item = data.item;
                        document.getElementById('editItemId').value = item.id;
                        document.getElementById('editName').value = item.name || '';
                        document.getElementById('editBarcode').value = item.barcode || '';
                        document.getElementById('editLocation').value = item.storage_location || '';
                        document.getElementById('editCondition').value = item.storage_condition || '常溫';
                        document.getElementById('editQuantity').value = item.quantity || 0;
                        document.getElementById('editPrice').value = item.unit_price || 0;
                        document.getElementById('editStatus').value = item.item_status || '在庫';
                        document.getElementById('editAIStatus').value = item.ai_check_status || 'Pass';
                        editModal.show();
                    }
                });
        }

        function saveEdit() {
            const itemId = document.getElementById('editItemId').value;
            const data = {
                name: document.getElementById('editName').value,
                barcode: document.getElementById('editBarcode').value,
                storage_location: document.getElementById('editLocation').value,
                storage_condition: document.getElementById('editCondition').value,
                quantity: parseFloat(document.getElementById('editQuantity').value),
                unit_price: parseFloat(document.getElementById('editPrice').value),
                item_status: document.getElementById('editStatus').value,
                ai_check_status: document.getElementById('editAIStatus').value
            };

            fetch(`/api/inventory/items/${itemId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('商品已更新');
                    editModal.hide();
                    loadInventory();
                    loadStats();
                } else {
                    alert('更新失敗：' + data.error);
                }
            });
        }
        function checkout() {
    const checkoutItemIdElement = document.getElementById('checkout-product-id');
    const checkoutQuantityElement = document.getElementById('checkout-quantity');

    if (!checkoutItemIdElement) {
        showError('商品ID輸入框未找到');
        return;
    }
    if (!checkoutQuantityElement) {
        showError('數量輸入框未找到');
        return;
    }

    const itemId = parseInt(checkoutItemIdElement.value);
    const quantity = parseInt(checkoutQuantityElement.value);
    
    if (isNaN(itemId) || !quantity || quantity <= 0) {
        showError('請輸入有效的商品ID和數量');
        return;
    }
    
    
    fetch('/api/inventory/checkout', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item_id: itemId, quantity: quantity})
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(`結帳成功！金額: $${data.final_amount}`);
            if (data.is_expiring_soon) {
                alert('此商品即期，已自動應用折扣');
            }
            loadInventory();
            loadStats();
            document.getElementById('checkout-product-id').value = '';
            document.getElementById('checkout-quantity').value = '';
        } else {
            alert(data.error || '結帳失敗');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('網絡錯誤');
    })
    .finally(() => {
        
    });
}
    </script>
</body>
</html>
