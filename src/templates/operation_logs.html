<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日誌審計 - 超商庫存管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container-main {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 90px; /* 為固定導航欄留出空間 */
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            border: none;
        }

        .card-header h2 {
            font-size: 1.3em;
            margin: 0;
            font-weight: 600;
        }

        .card-body {
            padding: 30px;
        }

        /* 統計卡片 */
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border-top: 4px solid #667eea;
        }

        .stat-card.success {
            border-top-color: #28a745;
        }

        .stat-card.failure {
            border-top-color: #dc3545;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            margin: 10px 0;
            color: #667eea;
        }

        .stat-card.success .stat-number {
            color: #28a745;
        }

        .stat-card.failure .stat-number {
            color: #dc3545;
        }

        .stat-label {
            color: #666;
            font-size: 0.95em;
        }

        /* 表格樣式 */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
            font-weight: 600;
            color: #333;
        }

        .table tbody td {
            vertical-align: middle;
            padding: 15px;
        }

        .table tbody tr:hover {
            background: #f8f9fa;
        }

        /* 徽章 */
        .badge {
            padding: 8px 12px;
            font-weight: 600;
            border-radius: 6px;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-failure {
            background: #dc3545;
            color: white;
        }

        /* 按鈕 */
        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        /* 表單 */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 標籤頁 */
        .nav-tabs {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }

        .nav-link {
            color: #666;
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .nav-link.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: none;
        }

        /* 警告消息 */
        .alert {
            border-radius: 8px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }

        /* 圖表容器 */
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .card-body {
                padding: 20px;
            }

            .stat-card {
                margin-bottom: 15px;
            }

            .stat-number {
                font-size: 2em;
            }

            .table {
                font-size: 0.9em;
            }

            .table tbody td {
                padding: 10px;
            }
        }

        /* 加載動畫 */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 操作類型顏色 */
        .op-create { color: #28a745; }
        .op-update { color: #ffc107; }
        .op-delete { color: #dc3545; }
        .op-view { color: #17a2b8; }
        .op-export { color: #667eea; }
        .op-import { color: #764ba2; }
        .op-search { color: #6c757d; }
    </style>
</head>
<body>
    <div style="padding: 20px 30px; background: white; border-bottom: 1px solid #eee; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;">
        <a href="/" style="display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='#5568d3'" onmouseout="this.style.background='#667eea'">
            ← 返回主頁
        </a>
    </div>
    <div class="container-main">
        <!-- 頭部 -->
        <div class="header">
            <h1><i class="bi bi-clock-history"></i> 操作日誌審計系統</h1>
            <p>記錄和監控系統中的所有操作，確保數據安全和合規性</p>
        </div>

        <!-- 今日摘要 -->
        <div class="row" id="todaySummary">
            <div class="col-md-3">
                <div class="stat-card">
                    <i class="bi bi-lightning" style="font-size: 2em; color: #667eea;"></i>
                    <div class="stat-number" id="todayTotal">0</div>
                    <div class="stat-label">今日操作數</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card success">
                    <i class="bi bi-check-circle" style="font-size: 2em; color: #28a745;"></i>
                    <div class="stat-number" id="todaySuccess">0</div>
                    <div class="stat-label">成功操作</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card failure">
                    <i class="bi bi-x-circle" style="font-size: 2em; color: #dc3545;"></i>
                    <div class="stat-number" id="todayFailure">0</div>
                    <div class="stat-label">失敗操作</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <i class="bi bi-percent" style="font-size: 2em; color: #667eea;"></i>
                    <div class="stat-number" id="todaySuccessRate">0%</div>
                    <div class="stat-label">成功率</div>
                </div>
            </div>
        </div>

        <!-- 標籤頁 -->
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="logs-tab" data-bs-toggle="tab" data-bs-target="#logs" type="button" role="tab" aria-controls="logs" aria-selected="true">
                    <i class="bi bi-list"></i> 操作日誌
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="statistics-tab" data-bs-toggle="tab" data-bs-target="#statistics" type="button" role="tab" aria-controls="statistics" aria-selected="false">
                    <i class="bi bi-bar-chart"></i> 統計分析
                </button>
            </li>
        </ul>

        <!-- 標籤頁內容 -->
        <div class="tab-content">
            <!-- 操作日誌 -->
            <div class="tab-pane fade show active" id="logs" role="tabpanel" aria-labelledby="logs-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="bi bi-list"></i> 操作日誌查詢</h2>
                    </div>
                    <div class="card-body">
                        <!-- 篩選條件 -->
                        <div class="row mb-3">
                            <div class="col-md-2">
                                <label class="form-label">操作類型</label>
                                <select id="operationTypeFilter" class="form-select">
                                    <option value="">所有類型</option>
                                    <option value="create">新增</option>
                                    <option value="update">編輯</option>
                                    <option value="delete">刪除</option>
                                    <option value="view">查看</option>
                                    <option value="export">導出</option>
                                    <option value="import">導入</option>
                                    <option value="search">搜尋</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">模塊</label>
                                <select id="moduleFilter" class="form-select">
                                    <option value="">所有模塊</option>
                                    <option value="food">食品</option>
                                    <option value="inventory">庫存</option>
                                    <option value="barcode">條碼</option>
                                    <option value="alert">預警</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">狀態</label>
                                <select id="statusFilter" class="form-select">
                                    <option value="">所有狀態</option>
                                    <option value="success">成功</option>
                                    <option value="failure">失敗</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">開始日期</label>
                                <input type="date" id="startDateFilter" class="form-control">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">結束日期</label>
                                <input type="date" id="endDateFilter" class="form-control">
                            </div>
                            <div class="col-md-2" style="padding-top: 32px;">
                                <button class="btn btn-primary w-100" onclick="loadOperationLogs()">
                                    <i class="bi bi-search"></i> 查詢
                                </button>
                            </div>
                        </div>

                        <!-- 日誌表格 -->
                        <div class="table-responsive">
                            <table class="table" id="logsTable">
                                <thead>
                                    <tr>
                                        <th>時間</th>
                                        <th>操作類型</th>
                                        <th>模塊</th>
                                        <th>操作描述</th>
                                        <th>對象名稱</th>
                                        <th>用戶</th>
                                        <th>IP地址</th>
                                        <th>狀態</th>
                                    </tr>
                                </thead>
                                <tbody id="logsTableBody">
                                    <tr>
                                        <td colspan="8" style="text-align: center; padding: 40px;">
                                            <div class="loading-text">
                                                <div class="spinner"></div>
                                                <span>加載中...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- 分頁 -->
                        <nav id="pagination" style="display: none;">
                            <ul class="pagination justify-content-center">
                                <li class="page-item"><a class="page-link" href="#" onclick="previousPage()">上一頁</a></li>
                                <li class="page-item active"><span class="page-link" id="pageInfo">第 1 頁</span></li>
                                <li class="page-item"><a class="page-link" href="#" onclick="nextPage()">下一頁</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>

            <!-- 統計分析 -->
            <div class="tab-pane fade" id="statistics" role="tabpanel" aria-labelledby="statistics-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="bi bi-bar-chart"></i> 統計分析</h2>
                    </div>
                    <div class="card-body">
                        <!-- 按操作類型統計 -->
                        <div class="row">
                            <div class="col-md-6">
                                <h4>按操作類型統計</h4>
                                <div class="chart-container">
                                    <canvas id="operationChart"></canvas>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <h4>按模塊統計</h4>
                                <div class="chart-container">
                                    <canvas id="moduleChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- 成功/失敗統計 -->
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <h4>成功/失敗統計</h4>
                                <div class="chart-container">
                                    <canvas id="statusChart"></canvas>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <h4>過去7天趨勢</h4>
                                <div class="chart-container">
                                    <canvas id="trendChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- 最常操作的對象 -->
                        <div class="row mt-4">
                            <div class="col-md-12">
                                <h4>最常操作的對象（Top 10）</h4>
                                <div class="table-responsive">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th>對象名稱</th>
                                                <th>操作次數</th>
                                                <th>百分比</th>
                                            </tr>
                                        </thead>
                                        <tbody id="topObjectsBody">
                                            <tr><td colspan="3" style="text-align: center;">加載中...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api/operation-logs';
        let currentPage = 1;
        let totalPages = 1;
        let operationChart, moduleChart, statusChart, trendChart;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTodaySummary();
            loadOperationLogs();
            loadStatistics();
        });

        // 加載今日摘要
        async function loadTodaySummary() {
            try {
                const response = await fetch(`${API_BASE}/today`);
                const data = await response.json();

                if (data.success) {
                    const summary = data.summary;
                    document.getElementById('todayTotal').textContent = summary.total_operations;
                    document.getElementById('todaySuccess').textContent = summary.successful_operations;
                    document.getElementById('todayFailure').textContent = summary.failed_operations;
                    
                    const rate = summary.total_operations > 0 
                        ? Math.round((summary.successful_operations / summary.total_operations) * 100)
                        : 0;
                    document.getElementById('todaySuccessRate').textContent = rate + '%';
                }
            } catch (err) {
                console.error('加載摘要失敗:', err);
            }
        }

        // 加載操作日誌
        async function loadOperationLogs() {
            try {
                const operationType = document.getElementById('operationTypeFilter').value;
                const module = document.getElementById('moduleFilter').value;
                const status = document.getElementById('statusFilter').value;
                const startDate = document.getElementById('startDateFilter').value;
                const endDate = document.getElementById('endDateFilter').value;

                let url = `${API_BASE}?page=${currentPage}`;
                if (operationType) url += `&operation_type=${operationType}`;
                if (module) url += `&module=${module}`;
                if (status) url += `&status=${status}`;
                if (startDate) url += `&start_date=${startDate}`;
                if (endDate) url += `&end_date=${endDate}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    const tbody = document.getElementById('logsTableBody');
                    tbody.innerHTML = '';

                    if (data.logs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: #999;">暫無日誌記錄</td></tr>';
                    } else {
                        data.logs.forEach(log => {
                            const opClass = `op-${log.operation_type}`;
                            const statusBadge = log.status === 'success' 
                                ? '<span class="badge badge-success">成功</span>'
                                : '<span class="badge badge-failure">失敗</span>';
                            
                            const row = `
                                <tr>
                                    <td>${log.created_at}</td>
                                    <td><span class="${opClass}">${getOperationText(log.operation_type)}</span></td>
                                    <td>${log.module || '-'}</td>
                                    <td>${log.action_description || '-'}</td>
                                    <td>${log.object_name || '-'}</td>
                                    <td>${log.user_name || '-'}</td>
                                    <td>${log.user_ip || '-'}</td>
                                    <td>${statusBadge}</td>
                                </tr>
                            `;
                            tbody.innerHTML += row;
                        });
                    }

                    // 更新分頁
                    totalPages = data.pages;
                    document.getElementById('pageInfo').textContent = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
                    document.getElementById('pagination').style.display = data.pages > 1 ? 'block' : 'none';
                }
            } catch (err) {
                console.error('加載日誌失敗:', err);
            }
        }

        // 加載統計信息
        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/statistics`);
                const data = await response.json();

                if (data.success) {
                    // 操作類型圖表
                    const opLabels = data.operation_stats.map(s => getOperationText(s.type));
                    const opCounts = data.operation_stats.map(s => s.count);

                    if (operationChart) operationChart.destroy();
                    operationChart = new Chart(document.getElementById('operationChart'), {
                        type: 'bar',
                        data: {
                            labels: opLabels,
                            datasets: [{
                                label: '操作次數',
                                data: opCounts,
                                backgroundColor: '#667eea'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: 'y',
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });

                    // 模塊圖表
                    const modLabels = data.module_stats.map(s => s.module || '未分類');
                    const modCounts = data.module_stats.map(s => s.count);

                    if (moduleChart) moduleChart.destroy();
                    moduleChart = new Chart(document.getElementById('moduleChart'), {
                        type: 'doughnut',
                        data: {
                            labels: modLabels,
                            datasets: [{
                                data: modCounts,
                                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });

                    // 狀態圖表
                    const statusLabels = data.status_stats.map(s => s.status === 'success' ? '成功' : '失敗');
                    const statusCounts = data.status_stats.map(s => s.count);

                    if (statusChart) statusChart.destroy();
                    statusChart = new Chart(document.getElementById('statusChart'), {
                        type: 'pie',
                        data: {
                            labels: statusLabels,
                            datasets: [{
                                data: statusCounts,
                                backgroundColor: ['#28a745', '#dc3545']
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });

                    // 趨勢圖表
                    const trendDates = data.daily_stats.map(s => s.date);
                    const trendCounts = data.daily_stats.map(s => s.count);

                    if (trendChart) trendChart.destroy();
                    trendChart = new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: {
                            labels: trendDates,
                            datasets: [{
                                label: '操作數量',
                                data: trendCounts,
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: true }
                            }
                        }
                    });

                    // 最常操作的對象
                    const tbody = document.getElementById('topObjectsBody');
                    tbody.innerHTML = '';
                    const totalOps = data.top_objects.reduce((sum, obj) => sum + obj.count, 0);

                    data.top_objects.forEach(obj => {
                        const percentage = Math.round((obj.count / totalOps) * 100);
                        const row = `
                            <tr>
                                <td>${obj.name}</td>
                                <td>${obj.count}</td>
                                <td>
                                    <div class="progress" style="height: 20px;">
                                        <div class="progress-bar" style="width: ${percentage}%; background: #667eea;">${percentage}%</div>
                                    </div>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
            } catch (err) {
                console.error('加載統計失敗:', err);
            }
        }

        // 獲取操作文本
        function getOperationText(type) {
            const map = {
                'create': '新增',
                'update': '編輯',
                'delete': '刪除',
                'view': '查看',
                'export': '導出',
                'import': '導入',
                'search': '搜尋'
            };
            return map[type] || type;
        }

        // 分頁
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadOperationLogs();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadOperationLogs();
            }
        }
    </script>
</body>
</html>
