<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>條碼掃描 - 超商庫存管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container-main {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            margin: 0;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            border: none;
        }

        .card-header h2 {
            font-size: 1.3em;
            margin: 0;
            font-weight: 600;
        }

        .card-body {
            padding: 30px;
        }

        /* 掃碼區域 */
        .scanner-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scanner-frame {
            width: 80%;
            height: 60%;
            border: 3px solid #00ff00;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .scanner-frame::before,
        .scanner-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00ff00;
        }

        .scanner-frame::before {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }

        .scanner-frame::after {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            animation: scan 2s infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .scanner-status {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .scanner-status.ready {
            color: #00ff00;
        }

        .scanner-status.error {
            color: #ff4444;
        }

        /* 按鈕組 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        /* 手動輸入區 */
        .manual-input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #333;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 掃碼結果 */
        .scan-result {
            background: #f0f8ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .scan-result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scan-result h4 {
            color: #667eea;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #333;
        }

        .result-value {
            color: #666;
        }

        /* 標籤頁 */
        .nav-tabs {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }

        .nav-link {
            color: #666;
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .nav-link.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: none;
        }

        /* 警告消息 */
        .alert {
            border-radius: 8px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .card-body {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .scanner-frame {
                width: 90%;
                height: 50%;
            }
        }

        /* 加載動畫 */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 掃碼歷史 */
        .scan-history {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: white;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item-barcode {
            font-weight: 600;
            color: #667eea;
            font-family: monospace;
        }

        .history-item-time {
            font-size: 0.85em;
            color: #999;
        }

        .history-item-action {
            display: flex;
            gap: 5px;
        }

        .history-item-action button {
            padding: 4px 8px;
            font-size: 0.85em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-item-action .btn-use {
            background: #667eea;
            color: white;
        }

        .history-item-action .btn-use:hover {
            background: #5568d3;
        }

        .history-item-action .btn-delete {
            background: #dc3545;
            color: white;
        }

        .history-item-action .btn-delete:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- 返回按鈕 -->
        <div style="margin-bottom: 20px;">
            <a href="/" style="display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='#5568d3'" onmouseout="this.style.background='#667eea'">
                ← 返回主頁
            </a>
        </div>

        <!-- 頭部 -->
        <div class="header">
            <h1><i class="bi bi-qr-code-scan"></i> 條碼掃描系統</h1>
            <p>使用手機鏡頭掃描條碼或手動輸入</p>
        </div>

        <!-- 標籤頁 -->
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="scanner-tab" data-bs-toggle="tab" data-bs-target="#scanner" type="button" role="tab" aria-controls="scanner" aria-selected="true">
                    <i class="bi bi-camera"></i> 鏡頭掃碼
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button" role="tab" aria-controls="manual" aria-selected="false">
                    <i class="bi bi-keyboard"></i> 手動輸入
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab" aria-controls="history" aria-selected="false">
                    <i class="bi bi-clock-history"></i> 掃碼歷史
                </button>
            </li>
        </ul>

        <!-- 標籤頁內容 -->
        <div class="tab-content">
            <!-- 鏡頭掃碼 -->
            <div class="tab-pane fade show active" id="scanner" role="tabpanel" aria-labelledby="scanner-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="bi bi-camera"></i> 鏡頭實時掃碼</h2>
                    </div>
                    <div class="card-body">
                        <div id="alertMessage" class="alert" style="display: none;"></div>

                        <!-- 掃碼區域 -->
                        <div class="scanner-container" id="scannerContainer" style="display: none;">
                            <video id="video" autoplay playsinline></video>
                            <div class="scanner-overlay">
                                <div class="scanner-frame">
                                    <div class="scanner-line"></div>
                                </div>
                            </div>
                            <div class="scanner-status" id="scannerStatus">準備掃描...</div>
                        </div>

                        <!-- 按鈕組 -->
                        <div class="button-group">
                            <button id="startScannerBtn" class="btn btn-primary">
                                <i class="bi bi-play-circle"></i> 開始掃碼
                            </button>
                            <button id="stopScannerBtn" class="btn btn-danger" style="display: none;">
                                <i class="bi bi-stop-circle"></i> 停止掃碼
                            </button>
                            <button id="switchCameraBtn" class="btn btn-secondary" style="display: none;">
                                <i class="bi bi-arrow-repeat"></i> 切換鏡頭
                            </button>
                        </div>

                        <!-- 掃碼結果 -->
                        <div id="scanResult" class="scan-result">
                            <h4><i class="bi bi-check-circle"></i> 掃碼成功</h4>
                            <div class="result-item">
                                <span class="result-label">條碼：</span>
                                <span class="result-value" id="resultBarcode">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">商品名稱：</span>
                                <span class="result-value" id="resultName">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">分類：</span>
                                <span class="result-value" id="resultCategory">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">單價：</span>
                                <span class="result-value" id="resultPrice">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">儲存環境：</span>
                                <span class="result-value" id="resultStorage">-</span>
                            </div>
                            <div style="margin-top: 20px; display: flex; gap: 10px;">
                                <button id="useResultBtn" class="btn btn-success" style="flex: 1;">
                                    <i class="bi bi-check"></i> 使用此商品
                                </button>
                                <button id="continueScanning" class="btn btn-secondary" style="flex: 1;">
                                    <i class="bi bi-arrow-repeat"></i> 繼續掃碼
                                </button>
                            </div>
                        </div>

                        <!-- 提示信息 -->
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 提示：請允許瀏覽器訪問您的攝像頭，然後將條碼對準掃描框。
                        </div>
                    </div>
                </div>
            </div>

            <!-- 手動輸入 -->
            <div class="tab-pane fade" id="manual" role="tabpanel" aria-labelledby="manual-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="bi bi-keyboard"></i> 手動輸入條碼</h2>
                    </div>
                    <div class="card-body">
                        <div class="manual-input-section">
                            <div class="input-group">
                                <label for="manualBarcode">條碼編號 *</label>
                                <input type="text" id="manualBarcode" placeholder="輸入或粘貼條碼編號" autofocus>
                            </div>

                            <div style="display: flex; gap: 10px;">
                                <button id="searchBarcodeBtn" class="btn btn-primary" style="flex: 1;">
                                    <i class="bi bi-search"></i> 查詢商品
                                </button>
                                <button id="clearManualBtn" class="btn btn-secondary" style="flex: 1;">
                                    <i class="bi bi-x-circle"></i> 清空
                                </button>
                            </div>
                        </div>

                        <!-- 查詢結果 -->
                        <div id="manualScanResult" class="scan-result">
                            <h4><i class="bi bi-check-circle"></i> 查詢結果</h4>
                            <div class="result-item">
                                <span class="result-label">條碼：</span>
                                <span class="result-value" id="manualResultBarcode">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">商品名稱：</span>
                                <span class="result-value" id="manualResultName">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">分類：</span>
                                <span class="result-value" id="manualResultCategory">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">單價：</span>
                                <span class="result-value" id="manualResultPrice">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">儲存環境：</span>
                                <span class="result-value" id="manualResultStorage">-</span>
                            </div>
                            <div style="margin-top: 20px; display: flex; gap: 10px;">
                                <button id="useManualResultBtn" class="btn btn-success" style="flex: 1;">
                                    <i class="bi bi-check"></i> 使用此商品
                                </button>
                                <button id="searchAgainBtn" class="btn btn-secondary" style="flex: 1;">
                                    <i class="bi bi-arrow-repeat"></i> 再次查詢
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 掃碼歷史 -->
            <div class="tab-pane fade" id="history" role="tabpanel" aria-labelledby="history-tab">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="bi bi-clock-history"></i> 掃碼歷史</h2>
                    </div>
                    <div class="card-body">
                        <div class="scan-history" id="scanHistory">
                            <p style="text-align: center; color: #999; padding: 40px 0;">暫無掃碼記錄</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script>
        const API_BASE = '/api/barcode';
        let codeReader = null;
        let selectedDeviceId = null;
        let scanHistory = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadScanHistory();
        });

        // 開始掃碼
        document.getElementById('startScannerBtn').addEventListener('click', function() {
            startScanner();
        });

        // 停止掃碼
        document.getElementById('stopScannerBtn').addEventListener('click', function() {
            stopScanner();
        });

        // 切換鏡頭
        document.getElementById('switchCameraBtn').addEventListener('click', function() {
            switchCamera();
        });

        // 手動搜尋
        document.getElementById('searchBarcodeBtn').addEventListener('click', function() {
            searchBarcode();
        });

        // 清空手動輸入
        document.getElementById('clearManualBtn').addEventListener('click', function() {
            document.getElementById('manualBarcode').value = '';
            document.getElementById('manualBarcode').focus();
            document.getElementById('manualScanResult').classList.remove('show');
        });

        // 繼續掃碼
        document.getElementById('continueScanning').addEventListener('click', function() {
            document.getElementById('scanResult').classList.remove('show');
            document.getElementById('video').focus();
        });

        // 再次查詢
        document.getElementById('searchAgainBtn').addEventListener('click', function() {
            document.getElementById('manualScanResult').classList.remove('show');
            document.getElementById('manualBarcode').value = '';
            document.getElementById('manualBarcode').focus();
        });

        // 使用掃碼結果
        document.getElementById('useResultBtn').addEventListener('click', function() {
            useScannedProduct('camera');
        });

        document.getElementById('useManualResultBtn').addEventListener('click', function() {
            useScannedProduct('manual');
        });

        // 開始掃碼
        async function startScanner() {
            try {
                showAlert('正在初始化攝像頭...', 'info');
                
                const video = document.getElementById('video');
                const scannerContainer = document.getElementById('scannerContainer');
                const startBtn = document.getElementById('startScannerBtn');
                const stopBtn = document.getElementById('stopScannerBtn');
                const switchBtn = document.getElementById('switchCameraBtn');

                // 初始化ZXing掃碼器
                codeReader = new ZXing.BrowserMultiFormatReader();

                // 獲取可用的攝像頭
                const videoInputDevices = await codeReader.listVideoInputDevices();
                if (videoInputDevices.length === 0) {
                    showAlert('未找到可用的攝像頭', 'danger');
                    return;
                }

                // 使用第一個攝像頭
                selectedDeviceId = videoInputDevices[0].deviceId;

                // 開始掃碼
                await codeReader.decodeFromVideoDevice(selectedDeviceId, video, (result, err) => {
                    if (result) {
                        const barcode = result.text;
                        console.log('掃碼成功:', barcode);
                        handleScannedBarcode(barcode);
                    }
                });

                scannerContainer.style.display = 'block';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                switchBtn.style.display = videoInputDevices.length > 1 ? 'block' : 'none';
                
                showAlert('攝像頭已啟動，請掃描條碼', 'success');
            } catch (err) {
                console.error('啟動攝像頭失敗:', err);
                showAlert('無法訪問攝像頭：' + err.message, 'danger');
            }
        }

        // 停止掃碼
        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
            }

            document.getElementById('scannerContainer').style.display = 'none';
            document.getElementById('startScannerBtn').style.display = 'block';
            document.getElementById('stopScannerBtn').style.display = 'none';
            document.getElementById('switchCameraBtn').style.display = 'none';
            
            showAlert('掃碼已停止', 'info');
        }

        // 切換攝像頭
        async function switchCamera() {
            try {
                const videoInputDevices = await codeReader.listVideoInputDevices();
                if (videoInputDevices.length < 2) {
                    showAlert('只有一個攝像頭可用', 'info');
                    return;
                }

                // 切換到下一個攝像頭
                const currentIndex = videoInputDevices.findIndex(d => d.deviceId === selectedDeviceId);
                selectedDeviceId = videoInputDevices[(currentIndex + 1) % videoInputDevices.length].deviceId;

                // 重新開始掃碼
                stopScanner();
                setTimeout(startScanner, 500);
            } catch (err) {
                showAlert('切換攝像頭失敗', 'danger');
            }
        }

        // 處理掃碼結果
        async function handleScannedBarcode(barcode) {
            try {
                // 查詢條碼資料庫
                const response = await fetch(`${API_BASE}/search?barcode=${encodeURIComponent(barcode)}`);
                const data = await response.json();

                if (data.success) {
                    const product = data.product;
                    displayScanResult(product, 'camera');
                    addToHistory(barcode, product.product_name);
                } else {
                    showAlert('條碼不存在於資料庫', 'danger');
                }
            } catch (err) {
                console.error('查詢失敗:', err);
                showAlert('查詢失敗：' + err.message, 'danger');
            }
        }

        // 手動搜尋條碼
        async function searchBarcode() {
            const barcode = document.getElementById('manualBarcode').value.trim();
            
            if (!barcode) {
                showAlert('請輸入條碼編號', 'danger');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/search?barcode=${encodeURIComponent(barcode)}`);
                const data = await response.json();

                if (data.success) {
                    const product = data.product;
                    displayScanResult(product, 'manual');
                    addToHistory(barcode, product.product_name);
                } else {
                    showAlert('條碼不存在於資料庫', 'danger');
                }
            } catch (err) {
                console.error('查詢失敗:', err);
                showAlert('查詢失敗：' + err.message, 'danger');
            }
        }

        // 顯示掃碼結果
        function displayScanResult(product, source) {
            const resultDiv = source === 'camera' ? 
                document.getElementById('scanResult') : 
                document.getElementById('manualScanResult');

            const prefix = source === 'camera' ? 'result' : 'manualResult';

            document.getElementById(prefix + 'Barcode').textContent = product.barcode;
            document.getElementById(prefix + 'Name').textContent = product.product_name;
            document.getElementById(prefix + 'Category').textContent = product.category;
            document.getElementById(prefix + 'Price').textContent = '$' + product.unit_price.toFixed(2);
            document.getElementById(prefix + 'Storage').textContent = product.storage_condition;

            // 存儲當前商品信息
            resultDiv.dataset.product = JSON.stringify(product);

            resultDiv.classList.add('show');
        }

        // 使用掃碼結果
        function useScannedProduct(source) {
            const resultDiv = source === 'camera' ? 
                document.getElementById('scanResult') : 
                document.getElementById('manualScanResult');

            const product = JSON.parse(resultDiv.dataset.product);

            // 跳轉到入庫頁面並傳遞商品信息
            const params = new URLSearchParams({
                barcode: product.barcode,
                name: product.product_name,
                category: product.category,
                unit_price: product.unit_price,
                storage_condition: product.storage_condition
            });

            window.location.href = `/inventory?${params.toString()}`;
        }

        // 添加到歷史
        function addToHistory(barcode, name) {
            const item = {
                barcode: barcode,
                name: name,
                time: new Date().toLocaleTimeString('zh-TW')
            };

            scanHistory.unshift(item);
            if (scanHistory.length > 20) {
                scanHistory.pop();
            }

            saveScanHistory();
            updateHistoryDisplay();
        }

        // 保存掃碼歷史
        function saveScanHistory() {
            localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
        }

        // 加載掃碼歷史
        function loadScanHistory() {
            const saved = localStorage.getItem('scanHistory');
            if (saved) {
                scanHistory = JSON.parse(saved);
                updateHistoryDisplay();
            }
        }

        // 更新歷史顯示
        function updateHistoryDisplay() {
            const historyDiv = document.getElementById('scanHistory');

            if (scanHistory.length === 0) {
                historyDiv.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 0;">暫無掃碼記錄</p>';
                return;
            }

            historyDiv.innerHTML = scanHistory.map((item, index) => `
                <div class="history-item">
                    <div>
                        <div class="history-item-barcode">${item.barcode}</div>
                        <div style="color: #666; font-size: 0.9em;">${item.name}</div>
                        <div class="history-item-time">${item.time}</div>
                    </div>
                    <div class="history-item-action">
                        <button class="btn-use" onclick="useHistoryItem(${index})">使用</button>
                        <button class="btn-delete" onclick="deleteHistoryItem(${index})">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        // 使用歷史記錄
        function useHistoryItem(index) {
            const item = scanHistory[index];
            document.getElementById('manualBarcode').value = item.barcode;
            searchBarcode();
        }

        // 刪除歷史記錄
        function deleteHistoryItem(index) {
            scanHistory.splice(index, 1);
            saveScanHistory();
            updateHistoryDisplay();
        }

        // 顯示警告消息
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
